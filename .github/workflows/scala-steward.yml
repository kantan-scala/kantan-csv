on:
  schedule:
  - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'kantan-scala' }}
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 11
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: 1565841
          private-key: ${{ secrets.KANTAN_BOT_KEY }}
      - uses: scala-steward-org/scala-steward-action@b186ab858ce163f9af7b016fac32cfb3f2c2f503 # v2.88.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          author-email: "220091877+kantan-bot[bot]@users.noreply.github.com"
          author-name: "kantan-bot[bot]"
        env:
          JAVA_OPTS: "-Xmx8G"
